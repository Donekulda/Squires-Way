# IronyModManager Conversion Parts
#
# Ordering: use `parts[].dependencies` as the source of truth for conversion order.
# The suggested table in docs/plans/csharp-rust-conversion-workflow.md is illustrative only;
# it can disagree with this graph (e.g. `game` requires `platform`; `app` requires merging, game,
# localization, and di).
#
# Dependency highlights:
#   - After core: parser, io, and storage can proceed in parallel (each depends only on core).
#   - services requires parser, io, and storage.
#   - merging requires services.
#   - game requires platform (convert platform before game).
#   - app requires merging, game, localization, and di (typically last among main layers).
#   - peripheral depends only on core; can be scheduled with other core-only parts.
#
# Regenerate project lists from C# when layouts change: run analyze-deps.ps1 or
# /analyze-csharp-conversion-parts against Examples/IronyModManager/src.
#
# Edit current_targets to set which parts to convert in the current run.

phases:
  - core
  - parser
  - io
  - storage
  - services
  - merging
  - platform
  - game
  - localization
  - di
  - app
  - peripheral

parts:
  - id: core
    name: Core Models
    projects:
      - IronyModManager.Common
      - IronyModManager.Models.Common
      - IronyModManager.Models
      - IronyModManager.Shared
    dependencies: []
    phase: core
    enabled: true

  - id: parser
    name: Parser
    projects:
      - IronyModManager.Parser.Common
      - IronyModManager.Parser
    dependencies: [core]
    phase: parser
    enabled: true

  - id: io
    name: IO
    projects:
      - IronyModManager.IO.Common
      - IronyModManager.IO
    dependencies: [core]
    phase: io
    enabled: true

  - id: storage
    name: Storage
    projects:
      - IronyModManager.Storage.Common
      - IronyModManager.Storage
    dependencies: [core]
    phase: storage
    enabled: true

  - id: services
    name: Services
    projects:
      - IronyModManager.Services.Common
      - IronyModManager.Services
    dependencies: [parser, io, storage]
    phase: services
    enabled: true

  - id: merging
    name: Merging
    projects: []
    dependencies: [services]
    phase: merging
    enabled: true

  - id: platform
    name: Platform
    projects:
      - IronyModManager.Platform
    dependencies: [core]
    phase: platform
    enabled: true

  - id: game
    name: Game Handler
    projects:
      - IronyModManager.GameHandler
    dependencies: [platform]
    phase: game
    enabled: true

  - id: localization
    name: Localization
    projects:
      - IronyModManager.Localization
    dependencies: [core]
    phase: localization
    enabled: true

  - id: di
    name: Dependency Injection
    projects:
      - IronyModManager.DI
    dependencies: [core]
    phase: di
    enabled: true

  - id: app
    name: Main Application
    projects:
      - IronyModManager
    dependencies: [merging, game, localization, di]
    phase: app
    enabled: true

  - id: peripheral
    name: Peripheral
    projects:
      - IronyModManager.Updater
      - Irony.AppCastGenerator
    dependencies: [core]
    phase: peripheral
    enabled: true

# Active conversion targets (must respect dependencies above).
# Platform slice: `crate::platform` ã `PlatformConfigurationOptions` (+ nested DTOs), `PlatformConfiguration`,
# Linux display string helpers, clipboard trait/policy/errors, `host_os()`. Themes/Skia/Avalonia-specific code deferred.
# Game slice: `crate::game` ã `GameHandlerArgs` / `parse_args`, Steam timing constants, `SteamCoordinator` +
# `SteamRuntime` / `SysSteamRuntime` (Steamworks `Init` stubbed until linked), `launch_external_command`, Steam env +
# `steam_appid.txt`, `set_working_directory_to_executable_dir`.
# Localization slice: `crate::localization` ã `LocalizationManager`, `FileLocalizationResourceProvider`, `CurrentLocale`
# helpers (`culture_name` / `set_current`), JSON merge + dot-path keys (Irony `IronyModManager.Localization` core; no DI/UI attributes).
# DI slice: `crate::di` ã `InMemoryMessageBus` / `MessageBusEvent` (C# `IMessageBus` / `IMessageBusEvent` first slice),
# `DiBootstrap`, `MessageBusResource` (Bevy). SimpleInjector assembly scan / JSON DI / interceptors deferred.
# App slice (done): `crate::app` ã Bevy+egui shell; startup order mirrors Irony `Program.Main` (cwd, culture, tracing,
# panic hook, `ParsedCliArgs`, `PlatformShellConfig`, `try_single_instance` stub); `merging`/`game`/`localization`/`di`
# integrated via resources + UI demo. Avalonia/NLog/single-instance IPC/fatal subprocess not ported (documented in module rustdoc).
# Next dependency-first: `peripheral` (Updater, AppCastGenerator) ã depends only on `core`.
current_targets: [peripheral]
